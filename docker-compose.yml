services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: citrus-web

    ports:
      - "5173:5173"

    env_file:
      - .env.dev

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    restart: unless-stopped
